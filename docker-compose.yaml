services:
  saturn:
    platform: linux/amd64
    image: midianok/saturn:latest
    build:
      context: .
      dockerfile: ./Saturn.Telegram.Bot/Dockerfile
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  saturn-api:
    platform: linux/amd64
    image: midianok/saturn-api:latest
    build:
      context: .
      dockerfile: ./Saturn.Telegram.Api/Dockerfile
    env_file:
      - ./.env
    ports:
      - "5001:5001"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
    